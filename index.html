<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izloze</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .lines-img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      text-align: center;
      padding: 40px 28px;
      width: 100%;
      max-width: 1400px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .salidojums {
      font-size: clamp(56px, 8vw, 120px);
      font-weight: 900;
      color: #1a3a6b;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }

    .btn {
      padding: 18px 50px;
      font-size: 24px;
      font-family: 'Nunito', Arial, sans-serif;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: #1a3a6b;
      color: white;
      font-weight: 900;
      margin-bottom: 36px;
      opacity: 1;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.6s ease;
      box-shadow: 0 10px 30px rgba(26,58,107,0.3);
      letter-spacing: 0.05em;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 16px 40px rgba(26,58,107,0.4);
    }

    .btn:active { transform: scale(1.02); }

    .btn.hide {
      opacity: 0;
      pointer-events: none;
    }

    .stage {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .result {
      font-size: clamp(42px, 6vw, 100px);
      font-weight: 900;
      color: #1a3a6b;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
      padding: 0 20px;
    }

    .result.placeholder {
      color: rgba(26,58,107,0.25);
      font-size: clamp(80px, 10vw, 160px);
    }

    .spinning {
      animation: wobble 0.28s ease-in-out infinite, flicker 0.38s linear infinite;
    }

    .finish {
      animation: winnerPop 0.9s cubic-bezier(.2,.8,.2,1);
    }

    @keyframes wobble {
      0%   { transform: rotate(-5deg) translateX(-10px) scale(0.97); }
      25%  { transform: rotate(4deg) translateX(8px) scale(1.02); }
      50%  { transform: rotate(-3deg) translateX(-8px) scale(0.98); }
      75%  { transform: rotate(5deg) translateX(10px) scale(1.03); }
      100% { transform: rotate(-5deg) translateX(-10px) scale(0.97); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    @keyframes winnerPop {
      0% { transform: scale(0.6) rotate(-6deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

  <img class="lines-img" src="lines.png" alt="" />

  <div class="wrap">

    <button id="drawBtn" class="btn">SĀKT IZLOZI</button>

    <div class="stage">
      <div id="result" class="result placeholder">?</div>
    </div>
  </div>

  <script>
    const names = [
"Adele Sakoviča","Agate Buravcova","Agnese Medne","AIJA GALNIECE","Aija Smilga",

"Artūrs Šulbergs","Artūrs Veismanis","Astra Ondzule","Āboliņa Anda","Āris Patmalnieks",
"Baiba Čerņevska","Daina Taupmane","Daniels Bambals","Dārta Albiņa-Alba","Dāvis Briedis",
"Dzintra Adītāja","Edgars Bole","Edgars Dzirkalis","Edijs Bunduls","Edvards Sviķis",
"Elita Voiciša","Elīna Logina","Emija Nikola Karele","Emīls Grietēns","Emīls Lejnieks",
"Endijs Markuss Zorgevics","Ernests Roberts Vēriņš","Estere Papša","Evita Kraukle",
"Guntis Ruskis","Gustavs Linde","Gustavs Namnieks","Ģirts Paupers","Helēna Vidžupe",
"Ieva Stapāne","Inga Orlova","Ingus Urtāns","Inita Čapese","Jana Pietkeviča",
"Jānis Daubergs","Jānis Saliņš","Jānis Tilibs","Jānis Vēriņš","Jolanta Armuševica",
"Jurģis Namejs Zvejnieks","Karīna Krauze","Karlis Levensteins","Katrīna Baltaisbrence",

"Maruta Butāne","Maruta Līcīte","Matiss Siciliano","Māra Kājiņa","Miks Vēveris",

"Māra Makstniece","Tīna Dansone","Laura Džigune","Līga Ulmane","Andriana Laura Vitte",
"Katrīne Kazaka","Sandis Maskaļonoks","Eduards Krustiņš","Mārtiņš Toms Puķītis",

"Baiba Vertele","Sabīne Baltaisbrence","Laine Jansone","Ilona Buka",
"Dāvis Raivo Zvejnieks","Rita Savicka","Dagnija Puniņa","Niks Mežiņš","Ilze Romane",
"Edgars Krūmiņš","Austra Štrāla","Aelita Pāvule","Anna Apšiniece","Ingrīda Garbolinska",
"Aiva Volfa","Agnese Žagata","Pēteris Zvaigzne","Dāvids Purmalis","Elīna Lerķe",
"Andris Velme","Ilze Rudzīte","Nikola Aniņa","Laura Eimane","Rūta Dūduma",
"Sarmite Valaine","Paula Niedinga","Kurts Gailis","Anna Raita","Kristens Zvirgzdiņš",
"Marta Būmane"
];

    const result = document.getElementById('result');
    const drawBtn = document.getElementById('drawBtn');
    let spinInterval = null;
    let isRunning = false;

    function launchConfetti() {
      const end = Date.now() + 4000;
      const colors = ['#1a3a6b', '#f5a623', '#ffffff', '#f8c471'];
      (function frame() {
        confetti({ particleCount: 15, angle: 60, spread: 120, startVelocity: 55, gravity: 0.95, colors, origin: { x: 0, y: Math.random() * 0.7 } });
        confetti({ particleCount: 15, angle: 120, spread: 120, startVelocity: 55, gravity: 0.95, colors, origin: { x: 1, y: Math.random() * 0.7 } });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }

    function pickRandom() {
      return names[Math.floor(Math.random() * names.length)];
    }

    function draw() {
      if (isRunning) return;
      isRunning = true;
      drawBtn.classList.add('hide');
      result.classList.remove('finish', 'spinning', 'placeholder');
      void result.offsetWidth;
      result.classList.add('spinning');
      result.textContent = pickRandom();

      spinInterval = setInterval(() => {
        result.textContent = pickRandom();
      }, 70);

      setTimeout(() => {
        clearInterval(spinInterval);
        result.textContent = pickRandom();
        result.classList.remove('spinning');
        result.classList.add('finish');
        launchConfetti();
        setTimeout(() => {
          drawBtn.classList.remove('hide');
          isRunning = false;
        }, 800);
      }, 5000);
    }

    drawBtn.addEventListener('click', draw);
  </script>
</body>
</html>
