<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Mārupes Valsts ģimnāzija 115 · Prezentācija</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="stage">
    <div class="slide-frame-wrap" id="frameWrap"></div>
  </div>

<script>
  // ========== SLAIDU SARAKSTS ==========
  const slides = [
    { file: 'pirmais.html' },
    { file: 'memorial.html' },
    { file: 'direktore.html' },
    { file: 'pirmais.html' },
    { file: 'pazisti.html' },
    { file: 'lagzdkalns.html' },
    { file: 'pirmais.html' },
    { file: 'pazisti2.html' },
    { file: 'vpadome.html' },
    { file: 'pirmais.html' },
    { file: 'hronologija.html' },
    { file: 'hizloze.html' },
    { file: 'hronologija_laiks.html' },
    { file: '1.html' },
    { file: '2.html' },
    { file: '3.html' },
    { file: '4.html' },
    { file: '5.html' },
    { file: '6.html' },
    { file: '7.html' },
    { file: '8.html' },
    { file: 'pasvaldiba.html' },
    { file: 'pirmais.html' },
    { file: 'alias.html' },
    { file: 'alias_izloze.html' },
    { file: 'alias_laiks.html' },
    { file: 'dobele.html' },
    { file: 'pirmais.html' },
    { file: 'uzzime.html' },
    { file: 'uzzime_izloze.html' },
    { file: 'uzzime_laiks.html' },
    { file: 'akmens.html' },
    { file: 'uzzime_laiks.html' },
    { file: 'andzela.html' },
    { file: 'uzzime_laiks.html' },
    { file: 'trepes.html' },
    { file: 'izm.html' },
    { file: 'pirmais.html' },
    { file: 'atnesa.html' },
    { file: 'atnesa_izloze.html' },
    { file: 'atnesa.html' },
    { file: 'apdavinasana.html' },
    { file: 'skaitisana.html' },
    { file: 'koris.html' },
    { file: 'paldies.html' }
  ];

  // ========== STĀVOKLIS ==========
  let currentIndex = -1;
  let isTransitioning = false;
  let currentFrame = null;
  const frameWrap = document.getElementById('frameWrap');

  // ========== PALĪGFUNKCIJAS ==========
  function createIframe(src) {
    const f = document.createElement('iframe');
    f.className = 'slide-iframe';
    f.setAttribute('allow', 'autoplay');
    f.src = src;
    return f;
  }

  function attachKeyForwarder(iframe) {
    iframe.addEventListener('load', () => {
      try {
        const doc = iframe.contentDocument;
        if (!doc) return;
        doc.addEventListener('keydown', (e) => {
          const clone = new KeyboardEvent('keydown', {
            key: e.key,
            code: e.code,
            keyCode: e.keyCode,
            which: e.which,
            bubbles: true,
            cancelable: true
          });
          document.dispatchEvent(clone);
        });
      } catch (err) {
        console.warn('Could not attach iframe keydown forwarder:', err);
      }
    });
  }

  // ========== SLAIDA MAIŅA AR CROSSFADE ==========
  // Abi iframes pārklājas vienā vietā. Jaunais ielādējas neredzams (opacity 0),
  // tad paralēli vecais pazūd un jaunais parādās. Nav melnas pārejas —
  // fons ir oranžs (tā pati kā slaidos).
  function goTo(index) {
    if (index < 0 || index >= slides.length) return;
    if (index === currentIndex) return;
    if (isTransitioning) return;

    isTransitioning = true;
    currentIndex = index;

    const src = slides[index].file + '?v=' + Date.now();

    // Pirmais ielādējums — bez crossfade
    if (!currentFrame) {
      const newFrame = createIframe(src);
      newFrame.classList.add('visible');
      attachKeyForwarder(newFrame);
      frameWrap.appendChild(newFrame);
      currentFrame = newFrame;
      newFrame.addEventListener('load', () => {
        isTransitioning = false;
      }, { once: true });
      return;
    }

    // Jauns iframe tiek pievienots (opacity 0)
    const oldFrame = currentFrame;
    const newFrame = createIframe(src);
    attachKeyForwarder(newFrame);
    frameWrap.appendChild(newFrame);

    // Gaida, kamēr jaunais ielādējas, tad crossfade
    newFrame.addEventListener('load', () => {
      // Mazs buferis, lai fonti / attēli paspētu uzzīmēties
      setTimeout(() => {
        newFrame.classList.add('visible');
        oldFrame.classList.add('fading-out');

        // Pēc pārejas — iznīcina veco iframe (aptur tā skriptus)
        setTimeout(() => {
          try { oldFrame.src = 'about:blank'; } catch(e) {}
          oldFrame.remove();
          currentFrame = newFrame;
          isTransitioning = false;
        }, 650);
      }, 50);
    }, { once: true });
  }

  function next() { goTo(Math.min(currentIndex + 1, slides.length - 1)); }
  function prev() { goTo(Math.max(currentIndex - 1, 0)); }

  // ========== TASTATŪRAS KONTROLES ==========
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault();
      next();
    } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      prev();
    } else if (e.key === 'Home') {
      e.preventDefault();
      goTo(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      goTo(slides.length - 1);
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });

  // ========== AUTOMĀTISKA MĒROGOŠANA ==========
  // Math.max — aizpilda visu ekrānu (ja ekrāna proporcijas atšķiras no 2048x1080,
  // mazākā dimensijas puse tiks nedaudz apgriezta, bet nav melnu malu).
  function fitStage() {
    const scaleX = window.innerWidth / 2048;
    const scaleY = window.innerHeight / 1080;
    const scale = Math.max(scaleX, scaleY);
    frameWrap.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', fitStage);
  fitStage();

  // ========== SĀKUMA SLAIDS ==========
  goTo(0);
</script>
</body>
</html>
