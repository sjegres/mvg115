<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Atnesa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 2048px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
    font-family: 'Playfair Display', serif;
    color: #1a3a6b;
    position: relative;
  }

  /* Līnijas fonā */
  .lines-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 1;
  }

  /* Konfeti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    pointer-events: none;
    z-index: 2;
  }

  /* Smalks gaismas overlay */
  .light-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255, 250, 230, 0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 30%, rgba(255, 240, 200, 0.18) 0%, transparent 50%);
    pointer-events: none;
    z-index: 3;
  }

  /* Galvenais saturs */
  .slide-content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
  }

  /* Attēla rāmis — 50% no slaida platuma (~1024px) */
.photo-frame {
  position: relative;
  width: 1024px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-frame img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow:
    0 30px 80px rgba(26, 58, 107, 0.35),
    0 10px 30px rgba(26, 58, 107, 0.2);
  border-radius: 4px;
}

  /* Dekoratīvie stūri ap attēlu */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 3px solid #1a3a6b;
    opacity: 0.85;
    pointer-events: none;
  }

  .corner.tl { top: -30px; left: -30px; border-right: none; border-bottom: none; }
  .corner.tr { top: -30px; right: -30px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: -30px; left: -30px; border-right: none; border-top: none; }
  .corner.br { bottom: -30px; right: -30px; border-left: none; border-top: none; }
</style>
</head>
<body>
  <img class="lines-img" src="lines.png" alt="" />
  <div class="light-overlay"></div>

  <div class="slide-content">
    <div class="photo-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <img src="4.jpeg" alt="" />
    </div>
  </div>

</body>
</html>
