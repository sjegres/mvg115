<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Mārupes Valsts ģimnāzijas 115. dzimšanas diena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 2048px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
    font-family: 'Playfair Display', serif;
    color: #1a3a6b;
    position: relative;
  }

  /* Līnijas fonā */
  .lines-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 1;
  }

  /* Konfeti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    pointer-events: none;
    z-index: 2;
  }

  /* Smalks gaismas overlay */
  .light-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255, 250, 230, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 30%, rgba(255, 240, 200, 0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 3;
  }

  /* Galvenais saturs */
  .slide-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 4;
    text-align: center;
    padding: 0 120px;
  }

  /* Augšējais dekoratīvs elements */
  .top-decoration {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 40px;
    opacity: 0.9;
  }

  .deco-line {
    width: 90px;
    height: 2px;
    background: #1a3a6b;
  }

  .deco-diamond {
    width: 12px;
    height: 12px;
    background: #1a3a6b;
    transform: rotate(45deg);
  }

  /* Apakšvirsraksts */
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 72px;
    color: #1a3a6b;
    letter-spacing: 0.08em;
    margin-bottom: 30px;
    opacity: 0.92;
  }

  /* Centrā — lielais numurs */
  .anniversary-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    margin-bottom: 18px;
    /* Izlīdzina elementus pa to vizuālo vidu */
  }

  .side-ornament {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 80px;
    color: #1a3a6b;
    opacity: 0.4;
    line-height: 1;
    font-style: italic;
    /* Vizuāla korekcija — pārceļ zvaigzni uz 115. cipara vizuālo vidu */
    transform: translateY(50px);
  }

  .number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 340px;
    color: #1a3a6b;
    line-height: 0.9;
    letter-spacing: -0.03em;
    text-shadow:
      0 4px 20px rgba(26, 58, 107, 0.15),
      0 2px 0 rgba(255, 255, 255, 0.2);
    position: relative;
  }

  /* Galvenais teksts */
  .main-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 78px;
    color: #1a3a6b;
    letter-spacing: 0.03em;
    line-height: 1.15;
    margin-bottom: 40px;
    max-width: 1600px;
  }

  .main-title .accent {
    font-style: italic;
    font-weight: 400;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <img class="lines-img" src="lines.png" alt="" />
  <canvas id="confetti-canvas"></canvas>
  <div class="light-overlay"></div>

  <div class="slide-content">

    <div class="top-decoration">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line"></div>
    </div>

    <div class="subtitle">Mārupes Valsts ģimnāzijas</div>

    <div class="anniversary-row">
      <div class="side-ornament">✦</div>
      <div class="number">115.</div>
      <div class="side-ornament">✦</div>
    </div>

    <div class="main-title">
      <span class="accent">dzimšanas diena!</span>
    </div>

  </div>

<script>
  const myCanvas = document.getElementById('confetti-canvas');
  const myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true });

  const colors = ['#1a3a6b', '#f5a623', '#ffffff', '#f8c471', '#c77d1a'];

  // Nepārtraukts konfeti lietus no augšas
  function rainConfetti() {
    // Izkliedēts pa visu ekrāna augšu
    myConfetti({
      particleCount: 4,
      angle: 270,              // krīt uz leju
      spread: 70,
      startVelocity: 25,
      gravity: 0.7,
      drift: 0,
      ticks: 400,
      colors: colors,
      origin: { x: Math.random(), y: -0.05 },
      scalar: 0.9 + Math.random() * 0.5
    });

    // Dažreiz lielāks gabaliņš
    if (Math.random() < 0.25) {
      myConfetti({
        particleCount: 6,
        angle: 270,
        spread: 100,
        startVelocity: 30,
        gravity: 0.75,
        ticks: 400,
        colors: colors,
        origin: { x: Math.random(), y: -0.05 },
        scalar: 1.1
      });
    }

    requestAnimationFrame(rainConfetti);
  }

  // Sākumā mazs "uzliesmojums" svinīgam efektam
  function initialBurst() {
    const duration = 1500;
    const end = Date.now() + duration;
    (function frame() {
      myConfetti({
        particleCount: 5,
        angle: 60,
        spread: 80,
        startVelocity: 55,
        gravity: 0.85,
        colors: colors,
        origin: { x: 0, y: 0.3 }
      });
      myConfetti({
        particleCount: 5,
        angle: 120,
        spread: 80,
        startVelocity: 55,
        gravity: 0.85,
        colors: colors,
        origin: { x: 1, y: 0.3 }
      });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  // Palaiž
  initialBurst();
  rainConfetti();
</script>
</body>
</html>
