<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Paldies, ka bijāt kopā ar mani!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 2048px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
    font-family: 'Playfair Display', serif;
    color: #1a3a6b;
    position: relative;
  }

  /* Līnijas fonā */
  .lines-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 1;
  }

  /* Konfeti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    pointer-events: none;
    z-index: 2;
  }

  /* Smalks gaismas overlay */
  .light-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255, 250, 230, 0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 30%, rgba(255, 240, 200, 0.18) 0%, transparent 50%);
    pointer-events: none;
    z-index: 3;
  }

  /* Galvenais saturs */
  .slide-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 4;
    text-align: center;
    padding: 0 140px;
  }

  /* Augšējais dekoratīvs elements */
  .top-decoration {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 70px;
    opacity: 0.85;
  }

  .deco-line {
    width: 160px;
    height: 2px;
    background: #1a3a6b;
  }

  .deco-diamond {
    width: 14px;
    height: 14px;
    background: #1a3a6b;
    transform: rotate(45deg);
  }

  /* Galvenais "Paldies" */
  .paldies {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 280px;
    color: #1a3a6b;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 45px;
    text-shadow:
      0 6px 30px rgba(26, 58, 107, 0.18),
      0 3px 0 rgba(255, 255, 255, 0.2),
      0 0 80px rgba(255, 240, 200, 0.4);
  }

  /* Mid ornaments */
  .mid-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
    margin-bottom: 50px;
  }

  .mid-ornament .line {
    width: 220px;
    height: 1px;
    background: #1a3a6b;
    opacity: 0.55;
  }

  .mid-ornament .star {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: #1a3a6b;
    opacity: 0.6;
  }

  /* Apakšteksts */
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 76px;
    color: #1a3a6b;
    line-height: 1.2;
    letter-spacing: 0.04em;
    max-width: 1600px;
    text-shadow:
      0 2px 10px rgba(26, 58, 107, 0.1);
  }

  /* Apakšējais dekoratīvs elements */
  .bottom-decoration {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-top: 70px;
    opacity: 0.85;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <img class="lines-img" src="lines.png" alt="" />
  <canvas id="confetti-canvas"></canvas>
  <div class="light-overlay"></div>

  <div class="slide-content">

    <div class="top-decoration">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line"></div>
    </div>

    <h1 class="paldies">Paldies!</h1>

    <div class="mid-ornament">
      <div class="line"></div>
      <div class="star">✦</div>
      <div class="line"></div>
    </div>

    <div class="message">Prieks bija Jūs satikt!</div>

    <div class="bottom-decoration">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line"></div>
    </div>

  </div>

<script>
  // ===== KONFETI =====
  const myCanvas = document.getElementById('confetti-canvas');
  let myConfetti = () => {};
  if (typeof confetti !== 'undefined') {
    myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true });
  }
  const colors = ['#1a3a6b', '#f5a623', '#ffffff', '#f8c471', '#c77d1a'];

  // Sākuma uzliesmojums — svinīgs paldies
  function openingBurst() {
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        myConfetti({
          particleCount: 50,
          angle: 60,
          spread: 85,
          startVelocity: 60,
          gravity: 0.85,
          ticks: 260,
          colors: colors,
          origin: { x: 0, y: 0.55 }
        });
        myConfetti({
          particleCount: 50,
          angle: 120,
          spread: 85,
          startVelocity: 60,
          gravity: 0.85,
          ticks: 260,
          colors: colors,
          origin: { x: 1, y: 0.55 }
        });
      }, i * 400);
    }
  }

  // Nepārtraukts maigs konfeti lietus
  function dropConfetti() {
    myConfetti({
      particleCount: 3,
      angle: 270,
      spread: 70,
      startVelocity: 22,
      gravity: 0.9,
      ticks: 180,
      colors: colors,
      origin: { x: Math.random(), y: -0.05 },
      scalar: 0.9 + Math.random() * 0.4
    });
  }

  openingBurst();
  setInterval(dropConfetti, 200);
</script>
</body>
</html>
