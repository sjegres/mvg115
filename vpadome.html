<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Juris Rudzītis · Inga Kuzņecova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 2048px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
    font-family: 'Playfair Display', serif;
    color: #1a3a6b;
    position: relative;
  }

  /* Līnijas fonā */
  .lines-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 1;
  }

  /* Konfeti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    pointer-events: none;
    z-index: 2;
  }

  /* Smalks gaismas overlay */
  .light-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255, 250, 230, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 30%, rgba(255, 240, 200, 0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 3;
  }

  /* Galvenais saturs */
  .slide-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 4;
    text-align: center;
    padding: 0 120px;
  }

  /* Augšējais dekoratīvs elements */
  .top-decoration {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 80px;
    opacity: 0.85;
  }

  .deco-line {
    width: 120px;
    height: 2px;
    background: #1a3a6b;
  }

  .deco-diamond {
    width: 12px;
    height: 12px;
    background: #1a3a6b;
    transform: rotate(45deg);
  }

  /* Runātāju rinda */
  .speakers {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 120px;
    width: 100%;
    max-width: 1800px;
  }

  .speaker {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Vārds */
  .speaker-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 100px;
    color: #1a3a6b;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 40px;
    text-shadow:
      0 4px 20px rgba(26, 58, 107, 0.12),
      0 2px 0 rgba(255, 255, 255, 0.15);
  }

  /* Mazs dekoratīvs elements zem vārda */
  .speaker-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
  }

  .speaker-ornament .line {
    width: 70px;
    height: 1px;
    background: #1a3a6b;
    opacity: 0.55;
  }

  .speaker-ornament .star {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #1a3a6b;
    opacity: 0.5;
  }

  /* Amats */
  .speaker-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 42px;
    color: #1a3a6b;
    letter-spacing: 0.06em;
    line-height: 1.3;
    opacity: 0.92;
    max-width: 560px;
  }

  /* Vertikāla līnija starp runātājiem */
  .divider {
    width: 1px;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(26, 58, 107, 0.35) 20%,
      rgba(26, 58, 107, 0.35) 80%,
      transparent 100%);
    align-self: stretch;
    position: relative;
  }

  .divider::before {
    content: '✦';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #1a3a6b;
    opacity: 0.6;
    background: #f8c471;
    padding: 8px 0;
    line-height: 1;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <img class="lines-img" src="lines.png" alt="" />
  <canvas id="confetti-canvas"></canvas>
  <div class="light-overlay"></div>

  <div class="slide-content">

    <div class="top-decoration">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line"></div>
    </div>

    <div class="speakers">

      <div class="speaker">
        <h1 class="speaker-name">Juris Rudzītis</h1>
        <div class="speaker-ornament">
          <div class="line"></div>
          <div class="star">✦</div>
          <div class="line"></div>
        </div>
        <div class="speaker-title">Skolas padomes priekšsēdētājs</div>
      </div>

      <div class="divider"></div>

      <div class="speaker">
        <h1 class="speaker-name">Inga Kuzņecova</h1>
        <div class="speaker-ornament">
          <div class="line"></div>
          <div class="star">✦</div>
          <div class="line"></div>
        </div>
        <div class="speaker-title">Vecāku biedrības pārstāve</div>
      </div>

    </div>

  </div>

<script>
  const myCanvas = document.getElementById('confetti-canvas');
  let myConfetti = () => {};
  if (typeof confetti !== 'undefined') {
    myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true });
  }

  const colors = ['#1a3a6b', '#f5a623', '#ffffff', '#f8c471', '#c77d1a'];

  // Optimizēts konfeti — palaiž retāk (5x/s nevis 60x/s) un daļiņas izzūd ātrāk
  function dropConfetti() {
    myConfetti({
      particleCount: 3,
      angle: 270,
      spread: 70,
      startVelocity: 22,
      gravity: 0.9,
      ticks: 180,
      colors: colors,
      origin: { x: Math.random(), y: -0.05 },
      scalar: 0.9 + Math.random() * 0.4
    });
  }

  setInterval(dropConfetti, 200);
</script>
</body>
</html>
