<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izloze</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .lines-img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    /* konfeti canvas pilnā ekrānā */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      pointer-events: none;
      z-index: 100;
    }

    .wrap {
      text-align: center;
      padding: 40px 28px;
      width: 100%;
      max-width: 1400px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .salidojums {
      font-size: clamp(56px, 8vw, 120px);
      font-weight: 900;
      color: #1a3a6b;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }

    .stage {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-bottom: 36px;
    }

    .result {
      font-size: clamp(62px, 7vw, 120px);
      font-weight: 900;
      color: #1a3a6b;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
      padding: 0 20px;
    }

    .result.placeholder {
      color: rgba(26,58,107,0.25);
      font-size: clamp(100px, 12vw, 180px);
    }

    .spinning {
      animation: wobble 0.28s ease-in-out infinite, flicker 0.38s linear infinite;
    }

    .finish {
      animation: winnerPop 0.9s cubic-bezier(.2,.8,.2,1) forwards, pulse 1.8s ease-in-out 0.9s infinite;
    }

    .btn {
      padding: 18px 50px;
      font-size: 24px;
      font-family: 'Nunito', Arial, sans-serif;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: #1a3a6b;
      color: white;
      font-weight: 900;
      opacity: 1;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.6s ease;
      box-shadow: 0 10px 30px rgba(26,58,107,0.3);
      letter-spacing: 0.05em;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 16px 40px rgba(26,58,107,0.4);
    }

    .btn:active { transform: scale(1.02); }

    .btn.hide {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes wobble {
      0%   { transform: rotate(-5deg) translateX(-10px) scale(0.97); }
      25%  { transform: rotate(4deg) translateX(8px) scale(1.02); }
      50%  { transform: rotate(-3deg) translateX(-8px) scale(0.98); }
      75%  { transform: rotate(5deg) translateX(10px) scale(1.03); }
      100% { transform: rotate(-5deg) translateX(-10px) scale(0.97); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    @keyframes winnerPop {
      0%   { transform: scale(0.6) rotate(-6deg); opacity: 0; }
      60%  { transform: scale(1.1) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 0px rgba(26,58,107,0); }
      50%       { transform: scale(1.04); text-shadow: 0 0 30px rgba(26,58,107,0.35); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

  <img class="lines-img" src="lines.png" alt="" />
  <canvas id="confetti-canvas"></canvas>

  <div class="wrap">

    <div class="stage">
      <div id="result" class="result placeholder">?</div>
    </div>

    <button id="drawBtn" class="btn">SĀKT IZLOZI</button>
  </div>

  <script>
    const names = [
"Adele Sakoviča","Agate Buravcova","Agnese Medne","AIJA GALNIECE","Aija Smilga"
];

    const result = document.getElementById('result');
    const drawBtn = document.getElementById('drawBtn');
    const myCanvas = document.getElementById('confetti-canvas');

    // konfeti ar savu canvas pilnā ekrānā
    const myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true });

    let spinInterval = null;
    let isRunning = false;

    function launchConfetti() {
      const end = Date.now() + 4500;
      const colors = ['#1a3a6b', '#f5a623', '#ffffff', '#f8c471'];
      (function frame() {
        // kreisais mala
        myConfetti({ particleCount: 12, angle: 60, spread: 80, startVelocity: 60, gravity: 0.8, colors, origin: { x: 0, y: 0.5 } });
        // labais mala
        myConfetti({ particleCount: 12, angle: 120, spread: 80, startVelocity: 60, gravity: 0.8, colors, origin: { x: 1, y: 0.5 } });
        // centrs augšā
        myConfetti({ particleCount: 8, angle: 90, spread: 120, startVelocity: 50, gravity: 0.85, colors, origin: { x: 0.5, y: 0 } });
        // kreisais augšā
        myConfetti({ particleCount: 6, angle: 75, spread: 90, startVelocity: 55, gravity: 0.8, colors, origin: { x: 0.25, y: 0 } });
        // labais augšā
        myConfetti({ particleCount: 6, angle: 105, spread: 90, startVelocity: 55, gravity: 0.8, colors, origin: { x: 0.75, y: 0 } });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }

    function pickRandom() {
      return names[Math.floor(Math.random() * names.length)];
    }

    function draw() {
      if (isRunning) return;
      isRunning = true;
      drawBtn.classList.add('hide');
      result.classList.remove('finish', 'spinning', 'placeholder');
      void result.offsetWidth;
      result.classList.add('spinning');
      result.textContent = pickRandom();

      spinInterval = setInterval(() => {
        result.textContent = pickRandom();
      }, 70);

      setTimeout(() => {
        clearInterval(spinInterval);
        result.textContent = pickRandom();
        result.classList.remove('spinning');
        result.classList.add('finish');
        launchConfetti();
        setTimeout(() => {
          drawBtn.textContent = 'NĀKAMAIS';
          drawBtn.classList.remove('hide');
          isRunning = false;
        }, 800);
      }, 5000);
    }

    drawBtn.addEventListener('click', draw);
  </script>
</body>
</html>
